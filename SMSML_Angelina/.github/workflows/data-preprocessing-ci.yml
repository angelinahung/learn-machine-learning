name: ML Data Preprocessing CI Pipeline

# Trigger conditions for automated preprocessing
on:
  push:
    branches: [ main, master ]
    paths:
      - 'preprocessing/**'
      - 'seeds_dataset_raw/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_preprocessing:
        description: 'Force preprocessing even if no changes'
        required: false
        default: 'false'

jobs:
  automated-preprocessing:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout repository
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    # Step 2: Setup Python environment
    - name: Setup Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    # Step 3: Cache pip dependencies
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-preprocessing-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-preprocessing-
          ${{ runner.os }}-pip-
          
    # Step 4: Install dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn matplotlib seaborn joblib
        pip install -r Membangun_model/requirements.txt || echo "No requirements.txt found for model, continuing..."
        
    # Step 5: Create necessary directories  
    - name: Setup Directory Structure
      run: |
        mkdir -p preprocessing/seeds_dataset_preprocessing
        mkdir -p seeds_dataset_raw
        echo "Directory structure created successfully"
        
    # Step 6: Run automated preprocessing
    - name: Execute Automated Data Preprocessing
      run: |
        cd preprocessing
        python automate_angelina.py
        echo "Automated preprocessing completed"
        
    # Step 7: Verify processed data
    - name: Verify Processed Data
      run: |
        cd preprocessing
        python -c "
import pandas as pd
import os

# Check if all required files exist
files = ['X_train.csv', 'X_test.csv', 'y_train.csv', 'y_test.csv', 'seeds_processed_complete.csv']
base_dir = 'seeds_dataset_preprocessing'

for file in files:
    filepath = os.path.join(base_dir, file)
    if os.path.exists(filepath):
        df = pd.read_csv(filepath)
        print(f'✓ {file}: {df.shape}')
    else:
        print(f'✗ {file}: Missing')
        exit(1)

print('All processed datasets verified successfully!')
"
        
    # Step 8: Archive processed datasets
    - name: Archive Processed Datasets
      uses: actions/upload-artifact@v3
      with:
        name: processed-seeds-dataset-${{ github.sha }}
        path: |
          preprocessing/seeds_dataset_preprocessing/*.csv
          preprocessing/seeds_dataset_preprocessing/*.joblib
        retention-days: 30
        
    # Step 9: Generate preprocessing report
    - name: Generate Preprocessing Report
      run: |
        cd preprocessing
        python -c "
import pandas as pd
import os
from datetime import datetime

# Generate report
report = []
report.append('# Automated Data Preprocessing Report')
report.append(f'Generated: {datetime.now().strftime(\"%Y-%m-%d %H:%M:%S UTC\")}')
report.append(f'Commit: ${{ github.sha }}')
report.append('')

# Check processed data
base_dir = 'seeds_dataset_preprocessing'
if os.path.exists(base_dir):
    files = os.listdir(base_dir)
    report.append('## Processed Files')
    for file in sorted(files):
        if file.endswith('.csv'):
            filepath = os.path.join(base_dir, file)
            df = pd.read_csv(filepath)
            report.append(f'- **{file}**: {df.shape[0]} rows, {df.shape[1]} columns')
        else:
            report.append(f'- **{file}**: Auxiliary file')
    
    # Dataset statistics
    report.append('')
    report.append('## Dataset Statistics')
    X_train = pd.read_csv(os.path.join(base_dir, 'X_train.csv'))
    y_train = pd.read_csv(os.path.join(base_dir, 'y_train.csv'))
    
    report.append(f'- Training samples: {len(X_train)}')
    report.append(f'- Features: {X_train.shape[1]}')
    report.append(f'- Classes: {len(y_train[\"target\"].unique())}')
    report.append(f'- Class distribution: {y_train[\"target\"].value_counts().to_dict()}')

# Save report
with open('PREPROCESSING_REPORT.md', 'w') as f:
    f.write('\n'.join(report))
    
print('Preprocessing report generated successfully!')
"
        
    # Step 10: Upload processing report
    - name: Upload Preprocessing Report  
      uses: actions/upload-artifact@v3
      with:
        name: preprocessing-report-${{ github.sha }}
        path: preprocessing/PREPROCESSING_REPORT.md
        retention-days: 7
        
    # Step 11: Display summary
    - name: Display Processing Summary
      run: |
        echo "Automated Data Preprocessing Pipeline Completed Successfully!"
        echo ""
        echo "Processing Results:"
        echo "- Raw data loaded and validated"
        echo "- Missing values handled"  
        echo "- Features encoded and scaled"
        echo "- Data split into train/test sets"
        echo "- Processed datasets saved"
        echo "- Artifacts archived for download"
        echo ""
        echo "Generated Files:"
        ls -la preprocessing/seeds_dataset_preprocessing/ || echo "Directory not found"
        echo ""
        echo "🔗 Download processed datasets from the Artifacts section of this workflow run."